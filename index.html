<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー新規登録</title>
  <!-- CSSライブラリ（Bootstrap）で簡単なスタイリング -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-light">

  <div class="container py-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4">
      <h2 class="h4 text-center mb-4">新規ユーザー登録</h2>
      
      <!-- ローディング表示（LIFF初期化中） -->
      <div id="loading" class="text-center py-3">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">LINE認証中...</p>
      </div>

      <!-- 入力フォーム（初期状態は非表示） -->
      <form id="registerForm" class="d-none">
        <!-- LINE ID は hidden で保持して自動送信 -->
        <input type="hidden" id="lineId" name="lineId">

        <div class="mb-3">
          <label for="name" class="form-label">お名前</label>
          <input type="text" class="form-control" id="name" required placeholder="山田 太郎">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">メールアドレス</label>
          <input type="email" class="form-control" id="email" required placeholder="example@email.com">
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2">登録する</button>
      </form>

      <!-- 結果表示用 -->
      <div id="message" class="mt-3 alert d-none"></div>
    </div>
  </div>

  <script>
    // --- 各種設定 ---
    const LIFF_ID = '2010742995-6HPYymf9'; // あなたのLIFF IDを入力
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbypCXgf-qSXVyUFzuXyWIOLGo9BBoH2x_1Iz2fMwCcGe_rk-3ysxe9eljt0l6HPIr8Stw/exec'; // デプロイしたGASの「ウェブアプリURL」を入力

    // LIFFの初期化
    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          // ログインしていなければログイン画面へ誘導
          liff.login();
        } else {
          // ログイン済みならプロフィール情報を取得
          const profile = await liff.getProfile();
          
          // LINE ID(userId)を取得してフォームにセット
          document.getElementById('lineId').value = profile.userId;
          
          // ローディングを消してフォームを表示
          document.getElementById('loading').classList.add('d-none');
          document.getElementById('registerForm').classList.remove('d-none');
        }
      } catch (error) {
        console.error('LIFF初期化エラー:', error);
        showAlert('LINEとの連携に失敗しました。LINEアプリ内から再度開いてください。', 'danger');
      }
    }

    // フォーム送信イベントの処理
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const payload = {
        lineId: document.getElementById('lineId').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value
      };

      try {
        // GASにPOST送信
        const response = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'text/plain' // CORSエラー回避のため、GAS宛てはtext/plainが安定します
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === 'success') {
          showAlert('メンバー登録が完了しました！', 'success');
          document.getElementById('registerForm').reset();
          // 数秒後にLIFFウィンドウを閉じる
          setTimeout(() => { liff.closeWindow(); }, 2000);
        } else {
          showAlert(result.message, 'danger');
          submitBtn.disabled = false;
          submitBtn.textContent = '登録する';
        }

      } catch (error) {
        console.error('送信エラー:', error);
        showAlert('通信エラーが発生しました。時間を置いて再度お試しください。', 'danger');
        submitBtn.disabled = false;
        submitBtn.textContent = '登録する';
      }
    });

    // アラートメッセージ表示用のヘルパー関数
    function showAlert(msg, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.className = `mt-3 alert alert-${type}`;
      msgDiv.textContent = msg;
      msgDiv.classList.remove('d-none');
    }

    // ページ読み込み時にLIFF開始
    initializeLiff();
  </script>
</body>
</html>
